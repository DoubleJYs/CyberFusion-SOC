name: cyberfusion-platform-example

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in an Environment-local .env file}
      MYSQL_DATABASE: ${DB_NAME:-cyberfusion_soc}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${DB_PORT:-33306}:3306"
    volumes:
      - ${CYBERFUSION_ENV_ROOT:?Set CYBERFUSION_ENV_ROOT to an absolute runtime directory outside source}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-36379}:6379"
    volumes:
      - ${CYBERFUSION_ENV_ROOT:?Set CYBERFUSION_ENV_ROOT to an absolute runtime directory outside source}/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: cyberfusion-platform-backend:local
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-cyberfusion_soc}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in an Environment-local .env file}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_UPLOAD_BASE_DIR: /data/uploads
      LOGGING_FILE_PATH: /app/logs
      WAZUH_MANAGER_URL: ${WAZUH_MANAGER_URL:-}
      WAZUH_INDEXER_URL: ${WAZUH_INDEXER_URL:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18080}:8080"
    volumes:
      - ${CYBERFUSION_ENV_ROOT:?Set CYBERFUSION_ENV_ROOT to an absolute runtime directory outside source}/uploads:/data/uploads
      - ${CYBERFUSION_ENV_ROOT:?Set CYBERFUSION_ENV_ROOT to an absolute runtime directory outside source}/logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health/readiness"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

# Example values only. Put real .env, certs, logs, and volumes under CYBERFUSION_ENV_ROOT outside source.
# On Windows, use forward slashes in CYBERFUSION_ENV_ROOT, for example E:/CyberFusion/Environment/cyberfusion-platform.
