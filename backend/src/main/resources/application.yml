server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: cyberfusion-platform-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: ${APP_FILE_MAX_SIZE:20MB}
      max-request-size: ${APP_FILE_MAX_SIZE:20MB}

app:
  file:
    storage-type: local
    base-dir: ${APP_UPLOAD_BASE_DIR:${CYBERFUSION_ENV_ROOT:${user.home}/Environment/cyberfusion-platform}/uploads}
    max-size-mb: 20
    delete-physical-on-delete: false
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - txt
      - zip
  excel:
    max-import-rows: 5000
  security:
    cors:
      allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
      allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
      allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,X-CyberFusion-Agent-Token}
      exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Authorization}
      allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
      max-age-seconds: ${APP_CORS_MAX_AGE_SECONDS:3600}
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
      auth-requests-per-minute: ${APP_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:60}
      max-tracked-clients: ${APP_RATE_LIMIT_MAX_TRACKED_CLIENTS:5000}
      excluded-paths: ${APP_RATE_LIMIT_EXCLUDED_PATHS:/health,/v3/api-docs,/swagger-ui,/swagger-ui.html}

soc:
  wazuh:
    manager-url: ${WAZUH_MANAGER_URL:}
    indexer-url: ${WAZUH_INDEXER_URL:}
    username: ${WAZUH_USERNAME:}
    password: ${WAZUH_PASSWORD:}
    manager-username: ${WAZUH_MANAGER_USERNAME:${WAZUH_USERNAME:}}
    manager-password: ${WAZUH_MANAGER_PASSWORD:${WAZUH_PASSWORD:}}
    indexer-username: ${WAZUH_INDEXER_USERNAME:${WAZUH_USERNAME:}}
    indexer-password: ${WAZUH_INDEXER_PASSWORD:${WAZUH_PASSWORD:}}
    tls-verify: ${WAZUH_TLS_VERIFY:true}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
